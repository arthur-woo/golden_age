services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-golden_age}
      POSTGRES_USER: ${POSTGRES_USER:-golden_age}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-golden_age}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ../backend:/app/backend
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgresql://${POSTGRES_USER:-golden_age}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-golden_age}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    command: python manage.py qcluster
    volumes:
      - ../backend:/app/backend
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DATABASE_URL: postgresql://${POSTGRES_USER:-golden_age}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-golden_age}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
